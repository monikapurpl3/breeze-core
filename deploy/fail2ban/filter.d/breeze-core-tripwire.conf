# Breeze Core tripwire — a non-LAN hit on an admin endpoint (proxy answers
# 403) is hostile by definition. Deploy to
# /etc/fail2ban/filter.d/breeze-core-tripwire.conf. See HARDENING.md.
[Definition]
failregex = ^<HOST> \S+ \S+ \[\] "(?:GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS) /api/auth/(?:enroll/approve|devices)[^"]*" 403
ignoreregex =
