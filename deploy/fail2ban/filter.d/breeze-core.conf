# Breeze Core — probing / bad-cred / rate-limit abuse on the vhost access log.
# Deploy to /etc/fail2ban/filter.d/breeze-core.conf. See HARDENING.md.
#
# NOTE: fail2ban strips the [timestamp] but LEAVES the empty '[]' in the line
# it matches. A failregex containing the date matches NOTHING (silent). Verify
# with: fail2ban-regex <access.log> /etc/fail2ban/filter.d/breeze-core.conf
[Definition]
failregex = ^<HOST> \S+ \S+ \[\] "[^"]*" (?:400|401|403|404|405|422|429)
ignoreregex =
