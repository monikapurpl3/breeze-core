name: Packages

# Builds the self-contained bundles (glibc/musl x amd64/arm64), packages them
# as .deb/.rpm/.apk/.pkg.tar.zst + tarballs, smoke-tests a distro subset, and
# attaches everything to the GitHub release on tag pushes.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # upload release assets

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3     # arm64 bundles build under QEMU
      - uses: docker/setup-buildx-action@v3

      - name: Build self-contained bundles (glibc/musl x amd64/arm64)
        run: ./packaging/binary/build-binaries.sh

      - name: Package (deb/rpm/apk/pacman + tarballs)
        run: ./packaging/nfpm/build-packages.sh

      - name: Install-test subset (debian, leap, arch, alpine, void, gentoo)
        run: ./packaging/test/test-matrix.sh debian leap arch alpine void gentoo

      - name: Upload artifacts (non-tag runs)
        if: startsWith(github.ref, 'refs/tags/') == false
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packaging/out/pkg/*
          retention-days: 7

      - name: Attach to release (tag runs)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The release is created by the maintainer (or here if absent).
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "Breeze Core $GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" packaging/out/pkg/* --clobber
