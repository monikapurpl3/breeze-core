name: Packages

# Builds the self-contained bundles (glibc/musl x amd64/arm64), packages them
# as .deb/.rpm/.apk/.pkg.tar.zst + tarballs, smoke-tests a distro subset, and
# attaches everything to the GitHub release on tag pushes.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to attach the artifacts to (optional)"
        required: false
        default: ""

permissions:
  contents: write   # upload release assets

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3     # arm64 bundles build under QEMU
      - uses: docker/setup-buildx-action@v3

      # Scripts run via `bash` so a checkout without exec bits still works.
      - name: Build self-contained bundles (glibc/musl x amd64/arm64)
        run: bash ./packaging/binary/build-binaries.sh

      - name: Package (deb/rpm/apk/pacman + tarballs)
        run: bash ./packaging/nfpm/build-packages.sh

      - name: Install-test subset (debian, leap, arch, alpine, void, gentoo)
        run: bash ./packaging/test/test-matrix.sh debian leap arch alpine void gentoo

      - name: Resolve target release
        id: rel
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts (no target release)
        if: steps.rel.outputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packaging/out/pkg/*
          retention-days: 7

      - name: Attach to release
        if: steps.rel.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "Breeze Core $TAG" --generate-notes
          gh release upload "$TAG" packaging/out/pkg/* --clobber
